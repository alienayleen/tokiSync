name: Build Release

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docs/tokiSync.user.js"
      - "webpack.core.config.cjs"
      - "vite.config.js"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build UserScript & Viewer
        run: |
          npm run build:viewer
          npm run build:core
          # Prepare unified distribution directory for GitHub Pages
          mkdir -p _site
          # Core UserScript
          cp docs/tokiSync.user.js _site/
          # Viewer Application
          cp -r docs/* _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
