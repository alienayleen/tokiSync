name: Build and Deploy (Dev & Prod)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "webpack.core.config.cjs"
      - "vite.config.js"
      - ".github/workflows/**"
  release:
    types: [published]

permissions:
  contents: write # 릴리스 자산 업로드 및 배포를 위해 필요
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v3에서 v4로 업그레이드 (Node 20 환경 최적화)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # npm 캐시 활성화로 빌드 속도 향상

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Prepare Distribution Directory
        run: |
          # 배포용 최상위 폴더 생성
          mkdir -p ./deploy_dist

          # 타겟 디렉토리 환경 결정 (릴리스면 루트, 푸시면 dev 폴더)
          if [ "${{ github.event_name }}" == "release" ]; then
            TARGET_DIR="./deploy_dist"
          else
            TARGET_DIR="./deploy_dist/dev"
            mkdir -p $TARGET_DIR
          fi

          # 빌드 파일 복사
          cp docs/tokiSync.user.js $TARGET_DIR/
          cp -r docs/* $TARGET_DIR/
          cp google_app_script/TokiSync_Server_Bundle.gs $TARGET_DIR/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./deploy_dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
